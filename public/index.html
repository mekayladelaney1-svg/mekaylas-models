<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Influencer Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-black text-white min-h-screen">
  <div class="min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-gradient-to-r from-pink-600 to-purple-600 border-b-4 border-pink-500 sticky top-0 z-50 shadow-2xl">
      <div class="max-w-7xl mx-auto px-6 py-6">
        <div class="flex justify-between items-center">
          <div>
            <h1 class="text-5xl font-bold">✨ AI Influencer Studio</h1>
            <p class="text-pink-100 mt-2 text-lg">Create & Manage AI Models + Build Fan Pages</p>
          </div>
          <div class="text-right text-pink-100">
            <p class="text-2xl font-bold" id="modelCount">0</p>
            <p class="text-sm">Models Created</p>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 py-8 px-6">
      <div class="max-w-7xl mx-auto">
        <div class="grid md:grid-cols-3 gap-8">
          <!-- Create Model Form -->
          <div class="md:col-span-1">
            <div class="bg-gradient-to-br from-zinc-900 to-zinc-800 rounded-3xl p-8 border-2 border-pink-500 shadow-2xl sticky top-24">
              <h2 class="text-3xl font-bold mb-8 text-pink-400">🎨 Create AI Model</h2>

              <form id="modelForm" class="space-y-4">
                <div>
                  <label class="block text-sm font-semibold text-pink-300 mb-2">Model Name *</label>
                  <input
                    id="name"
                    type="text"
                    class="w-full bg-zinc-700 text-white p-4 rounded-xl border-2 border-zinc-600 focus:border-pink-500 focus:outline-none transition"
                    placeholder="e.g., Luna Chen"
                    required
                  />
                  <span class="error-message text-red-400 text-xs mt-1 hidden"></span>
                </div>

                <div>
                  <label class="block text-sm font-semibold text-pink-300 mb-2">Hair Color *</label>
                  <select id="hair" class="w-full bg-zinc-700 text-white p-4 rounded-xl border-2 border-zinc-600 focus:border-pink-500 focus:outline-none transition" required>
                    <option value="">Select hair color</option>
                    <option value="Blonde">Blonde</option>
                    <option value="Black">Black</option>
                    <option value="Brown">Brown</option>
                    <option value="Red">Red</option>
                    <option value="Purple">Purple</option>
                    <option value="Blue">Blue</option>
                  </select>
                  <span class="error-message text-red-400 text-xs mt-1 hidden"></span>
                </div>

                <div>
                  <label class="block text-sm font-semibold text-pink-300 mb-2">Eye Color *</label>
                  <select id="eyes" class="w-full bg-zinc-700 text-white p-4 rounded-xl border-2 border-zinc-600 focus:border-pink-500 focus:outline-none transition" required>
                    <option value="">Select eye color</option>
                    <option value="Blue">Blue</option>
                    <option value="Green">Green</option>
                    <option value="Brown">Brown</option>
                    <option value="Hazel">Hazel</option>
                    <option value="Purple">Purple</option>
                  </select>
                  <span class="error-message text-red-400 text-xs mt-1 hidden"></span>
                </div>

                <div>
                  <label class="block text-sm font-semibold text-pink-300 mb-2">Personality Type *</label>
                  <select id="personality" class="w-full bg-zinc-700 text-white p-4 rounded-xl border-2 border-zinc-600 focus:border-pink-500 focus:outline-none transition" required>
                    <option value="">Select personality</option>
                    <option value="Luxury">💎 Luxury</option>
                    <option value="Cute">🌸 Cute</option>
                    <option value="Funny">😂 Funny</option>
                    <option value="Confident">💪 Confident</option>
                    <option value="Mysterious">🌙 Mysterious</option>
                    <option value="Nerdy">🤓 Nerdy</option>
                  </select>
                  <span class="error-message text-red-400 text-xs mt-1 hidden"></span>
                </div>

                <div>
                  <label class="block text-sm font-semibold text-pink-300 mb-2">Bio *</label>
                  <textarea
                    id="bio"
                    class="w-full bg-zinc-700 text-white p-4 rounded-xl border-2 border-zinc-600 focus:border-pink-500 focus:outline-none transition h-32 resize-none"
                    placeholder="Describe your AI model... (min 10 characters)"
                    required
                  ></textarea>
                  <span class="error-message text-red-400 text-xs mt-1 hidden"></span>
                  <span class="text-xs text-zinc-400 mt-1" id="bioCount">0/500</span>
                </div>

                <button
                  type="submit"
                  class="w-full bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 text-white font-bold py-4 px-6 rounded-2xl transition transform hover:scale-105 active:scale-95 shadow-lg text-lg"
                >
                  ✨ Generate AI Model
                </button>
              </form>
            </div>
          </div>

          <!-- Models Display -->
          <div class="md:col-span-2">
            <div class="bg-gradient-to-br from-zinc-900 to-zinc-800 rounded-3xl p-8 border-2 border-purple-500 shadow-2xl">
              <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-bold text-purple-400">🌟 AI Models Gallery</h2>
                <select id="sortBy" class="bg-zinc-700 text-white px-4 py-2 rounded-lg border border-purple-500 focus:outline-none text-sm">
                  <option value="newest">Newest First</option>
                  <option value="name">Name (A-Z)</option>
                  <option value="followers">Most Popular</option>
                </select>
              </div>

              <!-- Empty State -->
              <div id="emptyState" class="text-center py-16">
                <div class="text-6xl mb-4">🎭</div>
                <p class="text-2xl text-zinc-400 mb-2">No models yet</p>
                <p class="text-zinc-500">Create your first AI influencer to get started!</p>
              </div>

              <!-- Models Grid -->
              <div id="modelsGrid" class="grid gap-6"></div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-zinc-900 border-t border-zinc-800 mt-12">
      <div class="max-w-7xl mx-auto px-6 py-8 text-center text-zinc-400">
        <p>&copy; 2026 AI Influencer Studio. Built with ✨ and Node.js</p>
      </div>
    </footer>
  </div>

  <!-- Modal for model details -->
  <div id="modelModal" class="hidden fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50 p-4">
    <div class="bg-zinc-900 rounded-3xl max-w-2xl w-full border-2 border-pink-500 shadow-2xl">
      <div class="p-8">
        <div class="flex justify-between items-start mb-6">
          <div>
            <h3 id="modalTitle" class="text-4xl font-bold text-pink-400 mb-2"></h3>
            <p id="modalPersonality" class="text-lg text-zinc-300"></p>
          </div>
          <button onclick="closeModal()" class="text-3xl text-zinc-400 hover:text-white">&times;</button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6 text-sm">
          <div class="bg-zinc-800 p-4 rounded-xl">
            <p class="text-zinc-400">Hair Color</p>
            <p id="modalHair" class="text-xl font-bold text-pink-400"></p>
          </div>
          <div class="bg-zinc-800 p-4 rounded-xl">
            <p class="text-zinc-400">Eye Color</p>
            <p id="modalEyes" class="text-xl font-bold text-pink-400"></p>
          </div>
        </div>

        <div class="mb-6">
          <p class="text-zinc-400 text-sm mb-2">Bio</p>
          <p id="modalBio" class="text-zinc-200"></p>
        </div>

        <div class="flex gap-4">
          <button onclick="editModel()" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-xl transition">✏️ Edit</button>
          <button onclick="deleteModel()" class="flex-1 bg-red-600 hover:bg-red-500 text-white font-bold py-3 px-4 rounded-xl transition">🗑️ Delete</button>
          <button onclick="closeModal()" class="flex-1 bg-zinc-700 hover:bg-zinc-600 text-white font-bold py-3 px-4 rounded-xl transition">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
